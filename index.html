<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MacLabs Support</title>
  <style>
    :root {
      color-scheme: light;
      --background: #f7f7f2;
      --text: #1a1a17;
      --muted: #5b5b55;
      --accent: #1f4f46;
      --border: rgba(26, 26, 23, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top, rgba(31, 79, 70, 0.08), transparent 40%),
        var(--background);
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
    }

    main {
      width: min(100%, 560px);
      padding: 40px 32px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.72);
      text-align: center;
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 400;
      letter-spacing: -0.03em;
    }

    p {
      margin: 0;
      font-size: 1.05rem;
      line-height: 1.7;
      color: var(--muted);
    }

    a {
      color: var(--accent);
      text-decoration-thickness: 1px;
      text-underline-offset: 0.18em;
    }
  </style>
</head>
<body>
  <main>
    <h1>Support</h1>
    <p>
      For support, please email
      <a href="mailto:support@maclabs.de">support@maclabs.de</a>.
    </p>
  </main>
</body>
</html>
